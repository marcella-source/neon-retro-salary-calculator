</div>

<div style="text-align: left;">

<div style="text-align: left;">

<input id="days" type="number" value="22" min="1" max="31" style="width: 100%; box-sizing: border-box; padding: 8px 10px; background: rgba(2, 44, 61, 0.75); border: 1px solid #ffe066; border-radius: 6px; color: #ffe066; font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; text-shadow: 0 0 4px #ffb830; outline: none; box-shadow: 0 0 6px rgba(255, 224, 102, 0.35);"/>
</div>

</div>
</div>

<div style="background: rgba(2, 44, 61, 0.72); backdrop-filter: blur(4px); border: 1.5px solid #ffe066; border-radius: 12px; padding: 20px 18px; margin: 0 auto 16px; max-width: 600px; width: 100%; box-sizing: border-box; box-shadow: 0 0 14px rgba(255, 224, 102, 0.55), inset 0 0 14px rgba(255, 224, 102, 0.12);">

00:00:00.000
</div>

<div style="font-size: 10px; letter-spacing: 3px; color: #ffe066; margin-bottom: 4px; text-shadow: 0 0 6px #ffb830; display: flex; align-items: center; justify-content: center; gap: 8px;">
<span>💎 EARNINGS 🤫</span>
<button id="toggleEarnings" type="button" aria-label="显示/隐藏收入" style="background: transparent; border: none; color: #ffe066; cursor: pointer; padding: 0 4px; font-size: 13px; line-height: 1; text-shadow: 0 0 4px #ffb830;">👁</button>
</div>

¥0.0000
</div>

<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; padding-top: 14px; border-top: 1px dashed rgba(47, 224, 196, 0.4);">
<div>
<div style="font-size: 9px; letter-spacing: 1.5px; color: #2fe0c4;">PER SEC</div>

<div>
<div style="font-size: 9px; letter-spacing: 1.5px; color: #2fe0c4;">PER MIN</div>

</div>
<div>
<div style="font-size: 9px; letter-spacing: 1.5px; color: #2fe0c4;">PER HOUR</div>
<div id="perHour" style="font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; color: #fff; text-shadow: 0 0 4px #2fe0c4;">¥0.00</div>
</div>
</div>

<div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
<button id="startBtn" style="flex: 1; min-width: 110px; max-width: 180px; padding: 12px 18px; background: linear-gradient(135deg, #2fe0c4, #0a6e7e); border: 2px solid #ffe066; border-radius: 8px; color: #fff7c2; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-shadow: 0 0 6px #fff7c2; box-shadow: 0 0 12px #2fe0c4, 0 0 20px rgba(47, 224, 196, 0.5); transition: transform 0.1s;">
▶ 上班
</button>
<button id="stopBtn" style="flex: 1; min-width: 110px; max-width: 160px; padding: 12px 18px; background: linear-gradient(135deg, #ff9a3c, #d94a2a); border: 2px solid #fff7c2; border-radius: 8px; color: #fff; font-family: 'Courier New', monospace; font-size: 13px; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-shadow: 0 0 6px #fff; box-shadow: 0 0 12px #ff9a3c, 0 0 20px rgba(255, 154, 60, 0.5); transition: transform 0.1s;">
■ 下班
</button>
<button id="pauseBtn" style="flex: 1; min-width: 100px; max-width: 140px; padding: 12px 16px; background: rgba(2, 44, 61, 0.75); border: 2px solid #2fe0c4; border-radius: 8px; color: #2fe0c4; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-shadow: 0 0 6px #2fe0c4; box-shadow: 0 0 10px rgba(47, 224, 196, 0.45); transition: transform 0.1s;">
❚❚ 摸鱼
</button>
<button id="resetBtn" style="flex: 1; min-width: 120px; max-width: 170px; padding: 12px 16px; background: rgba(2, 44, 61, 0.75); border: 2px solid #ffe066; border-radius: 8px; color: #ffe066; font-family: 'Courier New', monospace; font-size: 12px; font-weight: 900; letter-spacing: 2px; cursor: pointer; text-shadow: 0 0 6px #ffb830; box-shadow: 0 0 10px rgba(255, 224, 102, 0.45); transition: transform 0.1s;">
🌅 新的一天
</button>

<div style="margin-top: 14px; font-size: 9px; letter-spacing: 3px; color: rgba(255, 247, 194, 0.65);">
🌊 ░▒▓ TROPICAL MODE ON ▓▒░ 🌊
</div>

<style>
#money-app input:focus { border-color: #fff7c2 !important; box-shadow: 0 0 10px #fff7c2 !important; }
#money-app button:hover { transform: translateY(-2px) scale(1.02); }
#money-app button:active { transform: scale(0.96); }
#money-app input::-webkit-outer-spin-button, #money-app input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#money-app input[type=number] { -moz-appearance: textfield; }
@keyframes neon-flicker { 0%, 100% { opacity: 1; } 48% { opacity: 1; } 50% { opacity: 0.88; } 52% { opacity: 1; } }
#money-app [style*="PAYDAY PARADISE"] { animation: neon-flicker 5s infinite; }
</style>

<script>
(function(){
  const $ = id => document.getElementById(id);
  let startTime = 0, elapsed = 0, rafId = null, running = false, stopped = false;

  function fmtTime(ms){
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    const s = Math.floor((ms%60000)/1000);
    const mm = Math.floor(ms%1000);
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(mm).padStart(3,'0');
  }

  function getRates(){
    const salary = parseFloat($('salary').value) || 0;
    const hours = parseFloat($('hours').value) || 1;
    const days = parseFloat($('days').value) || 1;
    const perSec = salary / days / hours / 3600;
    return { perSec, perMin: perSec*60, perHour: perSec*3600 };
  }

  function updateRates(){
    const r = getRates();
    $('perSec').textContent = '¥' + r.perSec.toFixed(4);
    $('perMin').textContent = '¥' + r.perMin.toFixed(2);
    $('perHour').textContent = '¥' + r.perHour.toFixed(2);
  }

  function tick(){
    const now = performance.now();
    const ms = elapsed + (now - startTime);
    $('timer').textContent = fmtTime(ms);
    const r = getRates();
    const earned = (ms/1000) * r.perSec;
    $('earnings').textContent = '¥' + earned.toFixed(4);
    rafId = requestAnimationFrame(tick);
  }

  $('startBtn').onclick = () => {
    if (running || stopped) return;
    running = true;
    startTime = performance.now();
    tick();
    $('startBtn').textContent = '▶ 搬砖中';
  };

  $('pauseBtn').onclick = () => {
    if (!running) return;
    running = false;
    elapsed += performance.now() - startTime;
    cancelAnimationFrame(rafId);
    $('startBtn').textContent = '▶ 继续上班';
  };

  $('stopBtn').onclick = () => {
    if (stopped) return;
    if (running) {
      elapsed += performance.now() - startTime;
      cancelAnimationFrame(rafId);
    }
    running = false;
    stopped = true;
    $('startBtn').textContent = '🎉 已下班';
  };

  $('resetBtn').onclick = () => {
    running = false;
    stopped = false;
    elapsed = 0;
    cancelAnimationFrame(rafId);
    $('timer').textContent = '00:00:00.000';
    $('earnings').textContent = '¥0.0000';
    $('startBtn').textContent = '▶ 上班';
  };

  ['salary','hours','days'].forEach(id => $(id).addEventListener('input', updateRates));
  updateRates();

  // ===== 两个独立的隐藏开关 =====
  const salaryInput = $('salary');
  const salaryBtn = $('toggleSalary');
  const earningsBtn = $('toggleEarnings');
  const earningsEl = $('earnings');
  const perSecEl = $('perSec');
  const perMinEl = $('perMin');
  const perHourEl = $('perHour');

  // 1) 月薪隐藏（只影响输入框本身）
  let salaryHidden = true;
  function applySalaryHidden(){
    if (salaryHidden) {
      salaryInput.type = 'password';
      salaryBtn.textContent = '👁';
      salaryBtn.style.color = '#2fe0c4';
      salaryBtn.style.textShadow = '0 0 4px #2fe0c4';
    } else {
      salaryInput.type = 'number';
      salaryBtn.textContent = '🙈';
      salaryBtn.style.color = '#ffe066';
      salaryBtn.style.textShadow = '0 0 4px #ffb830';
    }
  }
  salaryBtn.addEventListener('click', () => {
    salaryHidden = !salaryHidden;
    applySalaryHidden();
  });
  applySalaryHidden();

  // 2) 收入隐藏（只影响 earnings 和三个小数字）
  let earningsHidden = true;
  function applyEarningsHidden(){
    const blur = earningsHidden ? 'blur(10px)' : 'none';
    [earningsEl, perSecEl, perMinEl, perHourEl].forEach(el => {
      el.style.filter = blur;
    });
    if (earningsHidden) {
      earningsBtn.textContent = '👁';
      earningsBtn.style.color = '#ffe066';
    } else {
      earningsBtn.textContent = '🙈';
      earningsBtn.style.color = '#2fe0c4';
      earningsBtn.style.textShadow = '0 0 4px #2fe0c4';
    }
  }
  earningsBtn.addEventListener('click', () => {
    earningsHidden = !earningsHidden;
    applyEarningsHidden();
  });
  applyEarningsHidden();
})();
</script>
